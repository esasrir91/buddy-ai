name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Check formatting (black)
        run: black --check buddy/ tests/

      - name: Check import ordering (isort)
        run: isort --check-only buddy/ tests/

      - name: Lint (flake8)
        run: flake8 buddy/pulse/ tests/ --max-line-length 120 --extend-ignore E203,W503

      - name: Type check (mypy)
        run: mypy buddy/pulse/ --ignore-missing-imports

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" --no-cache-dir
          python -c "import pytest; print('pytest', pytest.__version__)"
          python -c "import buddy; print('buddy', buddy.__version__)"
          python -c "from buddy.cli.entrypoint import BUDDY_cli; print('cli ok')"

      - name: Diagnose test module imports
        run: python scripts/ci_diagnose_tests.py

      - name: Diagnose pytest collection
        run: python -m pytest tests/unit/ --collect-only -q

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=long --override-ini="addopts="

      - name: Run unit tests with coverage
        if: matrix.python-version == '3.11'
        run: python -m pytest tests/unit/ -v --cov=buddy --cov-report=term-missing --cov-report=xml --tb=short

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: Build distribution package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Check package with twine
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
